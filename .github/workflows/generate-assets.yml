name: Generate Art Assets

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run asset generator
        run: npm run generate-assets-ci
      - name: Commit generated assets back to repo (if changed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/illustrations || true
          if git diff --cached --quiet; then
            echo "No generated asset changes to commit"
            exit 0
          fi
          git commit -m "chore: regenerate art assets [skip ci]"
          git push origin HEAD:${{ github.ref }}
      - name: Upload generated assets
        uses: actions/upload-artifact@v4
        with:
          name: generated-art-assets
          path: assets/illustrations
